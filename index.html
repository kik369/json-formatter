<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free JSON Formatter & Validator | refaktor.dev</title>
<meta name="description" content="Free online JSON formatter and validator. Beautify, minify, validate, and convert JSON. No data stored, runs in your browser.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; padding: 20px; color: #333; }
.container { max-width: 900px; margin: 0 auto; }
h1 { color: #1a1a1a; margin-bottom: 5px; font-size: 28px; }
.subtitle { color: #666; margin-bottom: 20px; }
.tabs { display: flex; gap: 5px; margin-bottom: 15px; }
.tab { padding: 10px 20px; background: #e9ecef; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; }
.tab.active { background: #495057; color: white; }
.panel { background: white; padding: 20px; border-radius: 0 8px 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); min-height: 300px; }
textarea { width: 100%; height: 250px; font-family: 'Courier New', monospace; font-size: 14px; padding: 15px; border: 2px solid #dee2e6; border-radius: 6px; resize: vertical; }
textarea:focus { border-color: #495057; outline: none; }
button { background: #495057; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 5px; }
button:hover { background: #343a40; }
.error { color: #dc3545; margin-top: 10px; padding: 10px; background: #fff5f5; border-radius: 4px; }
.success { color: #28a745; margin-top: 10px; padding: 10px; background: #f0fff4; border-radius: 4px; }
.stats { display: flex; gap: 20px; margin-top: 15px; font-size: 14px; color: #666; }
footer { text-align: center; margin-top: 40px; color: #999; font-size: 13px; }
footer a { color: #1a73e8; text-decoration: none; }
.toolbar { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.toolbar button { font-size: 12px; padding: 6px 12px; }
</style>
</head>
<body>
<div class="container">
<h1>&#x1F4CA; JSON Formatter & Validator</h1>
<p class="subtitle">Free, instant, private — runs 100% in your browser. No data stored or transmitted.</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('format')">Format</button>
  <button class="tab" onclick="switchTab('validate')">Validate</button>
  <button class="tab" onclick="switchTab('minify')">Minify</button>
</div>

<div class="toolbar">
  <button onclick="formatJSON()">&#x2726; Format</button>
  <button onclick="minifyJSON()">&#x26a1; Minify</button>
  <button onclick="escapeJSON()">&#x271d;&#xfe0f; Escape</button>
  <button onclick="clearAll()">&#x1f5d1;&#xfe0f; Clear</button>
  <button onclick="copyResult()">&#x1f4cb; Copy</button>
  <button onclick="sampleJSON()">&#x1f3b2; Sample</button>
</div>

<div class="panel">
<textarea id="input" placeholder="Paste your JSON here..."></textarea>
<div id="output-area" style="display:none; margin-top: 15px;">
  <h3 style="margin-bottom: 8px; font-size: 16px;">Result:</h3>
  <textarea id="output" readonly style="background: #f8f9fa;"></textarea>
</div>
<div id="error-msg" class="error" style="display:none;"></div>
<div id="success-msg" class="success" style="display:none;"></div>
<div class="stats" id="stats" style="display:none;">
  <span id="char-count"></span>
  <span id="depth-info"></span>
  <span id="key-count"></span>
</div>
</div>

<footer>
  <p>Free JSON Formatter & Validator by <a href="https://refaktor.dev">refaktor.dev</a></p>
  <p>Privacy-first: processing happens entirely in your browser. No data leaves your device.</p>
</footer>

<script>
let currentTab = 'format';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
  if (tab === 'validate') validateJSON();
  if (tab === 'minify') { formatJSON(); minifyJSON(); }
}

function formatJSON() {
  hideMessages();
  const input = document.getElementById('input').value.trim();
  if (!input) return;
  try {
    const parsed = JSON.parse(input);
    const formatted = JSON.stringify(parsed, null, 2);
    document.getElementById('output').value = formatted;
    document.getElementById('output-area').style.display = 'block';
    showSuccess('Valid JSON — formatted successfully');
    showStats(formatted);
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
  }
}

function minifyJSON() {
  hideMessages();
  const input = document.getElementById('input').value.trim();
  if (!input) return;
  try {
    const parsed = JSON.parse(input);
    const minified = JSON.stringify(parsed);
    document.getElementById('output').value = minified;
    document.getElementById('output-area').style.display = 'block';
    showSuccess('JSON minified');
    showStats(minified);
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
  }
}

function validateJSON() {
  hideMessages();
  const input = document.getElementById('input').value.trim();
  if (!input) return;
  try {
    const parsed = JSON.parse(input);
    showSuccess('Valid JSON — ' + countKeys(parsed) + ' keys found');
    showStats(JSON.stringify(parsed, null, 2));
  } catch (e) {
    showError('Invalid JSON: ' + e.message);
  }
}

function escapeJSON() {
  hideMessages();
  const input = document.getElementById('input').value;
  document.getElementById('output').value = JSON.stringify(input);
  document.getElementById('output-area').style.display = 'block';
  showSuccess('String escaped to JSON');
}

function sampleJSON() {
  document.getElementById('input').value = JSON.stringify({
    "name": "Example Product",
    "price": 19.99,
    "tags": ["productivity", "automation", "developer-tools"],
    "features": ["Fast processing", "Cross-platform", "Open source"],
    "metadata": { "created": "2026-05-13", "version": "1.0.0" }
  }, null, 2);
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
  document.getElementById('output-area').style.display = 'none';
  hideMessages();
}

function copyResult() {
  const output = document.getElementById('output');
  output.select();
  document.execCommand('copy');
  showSuccess('Copied to clipboard!');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = '✅ ' + msg;
  el.style.display = 'block';
}

function hideMessages() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

function showStats(json) {
  const stats = document.getElementById('stats');
  stats.style.display = 'flex';
  document.getElementById('char-count').textContent = json.length + ' chars';
  try {
    const obj = JSON.parse(json);
    document.getElementById('key-count').textContent = countKeys(obj) + ' keys';
    document.getElementById('depth-info').textContent = getDepth(obj) + ' levels deep';
  } catch {}
}

function countKeys(obj) {
  let count = 0;
  if (typeof obj === 'object' && obj !== null) {
    for (let key in obj) { count++; if (typeof obj[key] === 'object' && obj[key] !== null) count += countKeys(obj[key]); }
  }
  return count;
}

function getDepth(obj) {
  if (typeof obj !== 'object' || obj === null) return 0;
  let max = 0;
  for (let key in obj) { max = Math.max(max, getDepth(obj[key])); }
  return max + 1;
}
</script>
</body>
</html>
